    <main class="max-w-4xl mx-auto mt-16 sm:mt-24 px-3 sm:px-4 pb-16">
        <div class="text-center mb-6 sm:mb-10">
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-3 sm:mb-4">PDF Compressor</h1>

                balance size and clarity.</p>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl p-4 sm:p-6 shadow-sm">

            <!-- Step 1: Upload -->
            <div id="uploadStep" class="block">
                <label for="fileInput" id="uploadArea"
                    class="block border-2 border-dashed border-gray-300 rounded-xl p-8 sm:p-12 text-center cursor-pointer hover:border-gray-400 transition hover:bg-gray-50 h-full w-full">
                    <svg class="w-12 h-12 sm:w-16 sm:h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">

                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                        </path>
                    </svg>
                    <p class="text-base sm:text-lg font-medium text-gray-900 mb-2">Click to Upload PDF</p>
                    <p class="text-xs sm:text-sm text-gray-500">Supports .pdf documents</p>
                    <input type="file" id="fileInput" accept="application/pdf" class="hidden">
                    <div id="fileName" class="mt-4 text-sm font-semibold text-blue-600 hidden"></div>
                </label>
            </div>

            <!-- ... -->

            <script type="module">
                // ... imports ...

                const els = {
                    uploadArea: document.getElementById('uploadArea'),
                    fileInput: document.getElementById('fileInput'),
                    // ...
                };

                // ...

                // UI Event Listeners
                // Removed click listener as label handles it natively
                els.fileInput.addEventListener('change', handleFile);

                els.uploadArea.addEventListener('dragover', (e) => {
                    // ...
                    e.preventDefault();
                    els.uploadArea.classList.add('bg-gray-50', 'border-gray-400');
                });

                els.uploadArea.addEventListener('dragleave', (e) => {
                    els.uploadArea.classList.remove('bg-gray-50', 'border-gray-400');
                });

                els.uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    els.uploadArea.classList.remove('bg-gray-50', 'border-gray-400');
                    if (e.dataTransfer.files.length) {
                        els.fileInput.files = e.dataTransfer.files;
                        handleFile({ target: els.fileInput });
                    }
                });

                els.qualitySlider.addEventListener('input', (e) => {
                    els.qualityValue.textContent = `${e.target.value}%`;
                    // Optional: Debounced preview update could go here, but might be heavy
                });

                els.compressBtn.addEventListener('click', startCompression);
                els.resetBtn.addEventListener('click', () => location.reload());

                async function handleFile(e) {
                    const file = e.target.files[0];
                    if (!file || file.type !== 'application/pdf') {
                        alert('Please upload a valid PDF file.');
                        return;
                    }

                    currentFile = file;
                    els.fileName.textContent = file.name;
                    els.fileName.classList.remove('hidden');

                    // Switch view
                    els.uploadStep.classList.add('hidden');
                    els.controlsStep.classList.remove('hidden');

                    try {
                        const arrayBuffer = await file.arrayBuffer();
                        pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                        renderPreview(1); // Render page 1
                    } catch (err) {
                        console.error(err);
                        alert('Error loading PDF.');
                        location.reload();
                    }
                }

                async function renderPreview(pageNum) {
                    const page = await pdfDoc.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1.0 });

                    // Adjust scale to fit the preview container
                    const containerWidth = els.previewCanvas.parentElement.clientWidth;
                    const scale = Math.min(1.0, containerWidth / viewport.width);
                    const scaledViewport = page.getViewport({ scale: scale });

                    els.previewCanvas.height = scaledViewport.height;
                    els.previewCanvas.width = scaledViewport.width;

                    const renderContext = {
                        canvasContext: els.previewCanvas.getContext('2d'),
                        viewport: scaledViewport
                    };
                    await page.render(renderContext).promise;
                }

                async function startCompression() {
                    if (!pdfDoc) return;

                    els.compressBtn.disabled = true;
                    els.compressBtn.classList.add('opacity-50');
                    els.statusArea.classList.remove('hidden');
                    els.resultArea.classList.add('hidden');

                    // Wait a bit to let UI update
                    await new Promise(r => setTimeout(r, 100));

                    try {
                        const quality = parseInt(els.qualitySlider.value) / 100;

                        // Ensure jsPDF is available
                        if (!window.jspdf) throw new Error("jsPDF library not loaded");
                        const { jsPDF } = window.jspdf;

                        // Create PDF with default settings. We will adjust per page.
                        // Note: jsPDF starts with 1 blank page. We will remove it at the end.
                        const newPdf = new jsPDF({
                            orientation: 'p',
                            unit: 'px',
                            hotfixes: ["px_scaling"]
                        });

                        const totalPages = pdfDoc.numPages;

                        for (let i = 1; i <= totalPages; i++) {
                            els.statusText.textContent = `Processing page ${i} of ${totalPages}...`;
                            els.progressBar.style.width = `${(i / totalPages) * 100}%`;

                            const page = await pdfDoc.getPage(i);
                            // Use scale 1.5 for balance between quality and memory usage. 
                            // 2.0 can crash on large files/mobile.
                            const viewport = page.getViewport({ scale: 1.5 });

                            const canvas = document.createElement('canvas');
                            canvas.width = viewport.width;
                            canvas.height = viewport.height;
                            const ctx = canvas.getContext('2d');

                            await page.render({
                                canvasContext: ctx,
                                viewport: viewport
                            }).promise;

                            // Compress
                            const imgData = canvas.toDataURL('image/jpeg', quality);

                            // Add new page with correct dimensions and orientation
                            // jsPDF addPage(format, orientation)
                            const orientation = viewport.width > viewport.height ? 'landscape' : 'portrait';
                            newPdf.addPage([viewport.width, viewport.height], orientation);

                            // Add the image to the CURRENT page (the one we just added)
                            // Note: addPage moves the cursor to the new page
                            newPdf.addImage(imgData, 'JPEG', 0, 0, viewport.width, viewport.height);

                            // Yield to UI to prevent freezing
                            await new Promise(r => setTimeout(r, 10));
                        }

                        // Delete the initial blank page (Page 1)
                        // We added pages starting from index 2 essentially (because of the initial 1)
                        // So now we have [Blank, Page1, Page2...]
                        if (newPdf.getNumberOfPages() > 1) {
                            newPdf.deletePage(1);
                        }

                        // Finish
                        els.statusText.textContent = 'Saving PDF...';
                        await new Promise(r => setTimeout(r, 100)); // UI update
                        newPdf.save(`compressed_${currentFile.name}`);

                        els.statusArea.classList.add('hidden');
                        els.resultArea.classList.remove('hidden');

                    } catch (err) {
                        console.error("Compression Failed:", err);
                        alert("An error occurred during compression. \n\nDetails: " + err.message);
                        els.statusArea.classList.add('hidden');
                    } finally {
                        els.compressBtn.disabled = false;
                        els.compressBtn.classList.remove('opacity-50');
                    }
                }
            </script>
